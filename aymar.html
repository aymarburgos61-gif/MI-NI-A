<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Aymar - Mi niña</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f8d0e0 0%, #fce4ec 100%);
            min-height: 100vh;
            padding: 50px 20px;
        }

        .contenedor {
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #d46b8f;
            font-size: 52px;
            margin-bottom: 50px;
            text-shadow: 3px 3px 15px rgba(212, 107, 143, 0.3);
            animation: fadeInDown 0.8s ease;
            position: relative;
        }

        h1::before {
            content: '🌸';
            position: absolute;
            left: 10%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 45px;
            opacity: 0.8;
        }

        h1::after {
            content: '🌸';
            position: absolute;
            right: 10%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 45px;
            opacity: 0.8;
        }

        .tarjeta {
            background-color: white;
            border-radius: 20px;
            padding: 0;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease;
            animation-fill-mode: both;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .tarjeta:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(212, 107, 143, 0.25);
        }

        .tarjeta::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(180deg, #ffb6c1, #d46b8f);
        }

        /* Estilo del enlace dentro de la tarjeta */
        .tarjeta a {
            display: block;
            text-decoration: none;
            padding: 28px 35px;
            font-size: 22px;
            color: #555;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 100%;
        }

        .tarjeta a:hover {
            color: #d46b8f;
            padding-left: 45px;
        }

        /* Emoji decorativo antes del texto */
        .tarjeta a::before {
            font-size: 32px;
            margin-right: 15px;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .tarjeta:hover a::before {
            transform: scale(1.2);
        }

        /* Emojis diferentes para cada tarjeta */
        .tarjeta:nth-child(1) a::before { content: '💖'; }
        .tarjeta:nth-child(2) a::before { content: '🎵'; }
        .tarjeta:nth-child(3) a::before { content: '👧'; }
        .tarjeta:nth-child(4) a::before { content: '✨'; }
        .tarjeta:nth-child(5) a::before { content: '💭'; }

        /* Retrasos de animación */
        .tarjeta:nth-child(1) { animation-delay: 0.1s; }
        .tarjeta:nth-child(2) { animation-delay: 0.2s; }
        .tarjeta:nth-child(3) { animation-delay: 0.3s; }
        .tarjeta:nth-child(4) { animation-delay: 0.4s; }
        .tarjeta:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================ */
        /* FORMATO PARA CELULAR - MEDIA QUERIES */
        /* ============================================ */
        
        /* Tablets (768px y menores) */
        @media (max-width: 768px) {
            body {
                padding: 30px 15px;
            }
            
            .contenedor {
                max-width: 100%;
            }
        }
        
        /* Celulares (600px y menores) */
        @media (max-width: 600px) {
            body {
                padding: 20px 15px;
            }
            
            h1 {
                font-size: 36px;
                margin-bottom: 35px;
            }
            
            h1::before, h1::after {
                font-size: 25px;
                display: none;
            }
            
            .tarjeta a {
                padding: 18px 22px;
                font-size: 16px;
            }
            
            .tarjeta a::before {
                font-size: 24px;
                margin-right: 12px;
            }
            
            .tarjeta:hover {
                transform: translateY(-3px) scale(1.01);
            }
            
            .tarjeta a:hover {
                padding-left: 28px;
            }
        }
        
        /* Celulares pequeños (400px y menores) */
        @media (max-width: 480px) {
            body {
                padding: 15px 12px;
            }
            
            h1 {
                font-size: 30px;
                margin-bottom: 25px;
            }
            
            .tarjeta {
                margin-bottom: 18px;
                border-radius: 15px;
            }
            
            .tarjeta a {
                padding: 14px 18px;
                font-size: 15px;
            }
            
            .tarjeta a::before {
                font-size: 20px;
                margin-right: 10px;
            }
            
            .tarjeta::before {
                width: 5px;
            }
        }
        
        /* Ajustes para pantallas muy pequeñas (320px) */
        @media (max-width: 320px) {
            h1 {
                font-size: 26px;
            }
            
            .tarjeta a {
                padding: 12px 15px;
                font-size: 13px;
            }
            
            .tarjeta a::before {
                font-size: 18px;
                margin-right: 8px;
            }
        }
        
        /* Para dispositivos con pantalla táctil (mejora la experiencia táctil) */
        @media (hover: none) and (pointer: coarse) {
            .tarjeta a {
                padding: 18px 22px;
            }
            
            .tarjeta:hover {
                transform: none;
            }
            
            .tarjeta:active {
                transform: scale(0.98);
                background-color: #fef5f7;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Mi niña</h1>

        </div>

        </div>

            <a href="perso.html">¿Cómo es?</a>
        </div>
        
        <div class="tarjeta">
            <a href="futuro.html">¿Qué desea ser?</a>
        </div>
        
        <div class="tarjeta">
            <a href="que-pensarias-de-ella.html">¿Qué pensarían de ella?</a>
        </div>
    </div>
</body>
</html>
