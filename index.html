<!DOCTYPE html>
<html>
<head>
    <title>Redirección</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f8d0e0; /* Rosa pastel */
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .contenedor {
            background-color: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: inline-block;
            animation: fadeIn 0.5s ease-in;
            width: auto;
            max-width: 90%;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h2 {
            color: #d46b8f;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        input {
            padding: 14px 20px;
            font-size: 16px;
            margin: 10px;
            width: 250px;
            border: 2px solid #f0b6d0;
            border-radius: 25px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }
        
        input:focus {
            border-color: #d46b8f;
            box-shadow: 0 0 10px rgba(212, 107, 143, 0.3);
            transform: scale(1.02);
        }
        
        /* Contenedor del botón con animación de colores girando */
        .boton-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 15px;
            border-radius: 30px;
        }
        
        .boton-wrapper::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(
                45deg,
                #ff0000,
                #ff7700,
                #ffdd00,
                #00ff00,
                #0000ff,
                #4b0082,
                #9400d3,
                #ff0000
            );
            background-size: 400%;
            border-radius: 30px;
            z-index: -1;
            animation: girarColores 3s linear infinite;
        }
        
        .boton-wrapper::after {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(
                45deg,
                #ff0000,
                #ff7700,
                #ffdd00,
                #00ff00,
                #0000ff,
                #4b0082,
                #9400d3,
                #ff0000
            );
            background-size: 400%;
            border-radius: 30px;
            z-index: -2;
            filter: blur(15px);
            animation: girarColores 3s linear infinite;
        }
        
        button {
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            background-color: white;
            color: #d46b8f;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            font-family: inherit;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        button:hover {
            transform: scale(1.05);
            color: #b84d70;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        @keyframes girarColores {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        .error {
            color: #ff4444;
            margin-top: 25px;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255,68,68,0.3);
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        /* Efecto de brillo en el input cuando hay error */
        .error-input {
            border-color: #ff4444 !important;
            box-shadow: 0 0 15px rgba(255,68,68,0.5) !important;
        }

        /* ============================================ */
        /* FORMATO PARA CELULAR - MEDIA QUERIES */
        /* ============================================ */
        
        /* Tablets (768px y menores) */
        @media (max-width: 768px) {
            .contenedor {
                padding: 40px;
                max-width: 85%;
            }
            
            h2 {
                font-size: 26px;
            }
        }
        
        /* Celulares (600px y menores) */
        @media (max-width: 600px) {
            body {
                margin-top: 0;
                padding: 20px;
            }
            
            .contenedor {
                padding: 30px 25px;
                max-width: 100%;
                width: 100%;
            }
            
            h2 {
                font-size: 22px;
                margin-bottom: 20px;
            }
            
            input {
                padding: 12px 16px;
                font-size: 14px;
                width: 100%;
                max-width: 220px;
                margin: 8px;
            }
            
            button {
                padding: 12px 30px;
                font-size: 16px;
            }
            
            .error {
                font-size: 12px;
                margin-top: 20px;
            }
        }
        
        /* Celulares pequeños (480px y menores) */
        @media (max-width: 480px) {
            .contenedor {
                padding: 25px 20px;
            }
            
            h2 {
                font-size: 20px;
                margin-bottom: 15px;
            }
            
            input {
                padding: 10px 14px;
                font-size: 13px;
                max-width: 200px;
            }
            
            button {
                padding: 10px 25px;
                font-size: 14px;
            }
            
            .error {
                font-size: 11px;
                margin-top: 15px;
            }
        }
        
        /* Para dispositivos con pantalla táctil */
        @media (hover: none) and (pointer: coarse) {
            button:hover {
                transform: none;
            }
            
            button:active {
                transform: scale(0.96);
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h2>🌸 Escribe un nombre 🌸</h2>
        <input type="text" id="nombreInput" placeholder="Escribe un nombre">
        <div class="boton-wrapper">
            <button onclick="redirigir()">✨ Ir ✨</button>
        </div>
        <div id="mensajeError" class="error"></div>
    </div>

    <script>
        function redirigir() {
            let nombre = document.getElementById('nombreInput').value.trim();
            let nombreOriginal = nombre;
            nombre = nombre.charAt(0).toUpperCase() + nombre.slice(1).toLowerCase();
            
            const mensajeError = document.getElementById('mensajeError');
            const inputElement = document.getElementById('nombreInput');
            
            if (nombre === "Aymar") {
                window.location.href = "aymar.html";
            } 
            else {
                mensajeError.innerHTML = '❌ Nombre no válido ❌';
                inputElement.classList.add('error-input');
                
                // Remover la clase de error después de 1.5 segundos
                setTimeout(() => {
                    inputElement.classList.remove('error-input');
                }, 1500);
                
                // Limpiar el input si no es válido (opcional)
                // document.getElementById('nombreInput').value = '';
            }
        }
        
        // Remover mensaje de error cuando el usuario empiece a escribir
        document.getElementById('nombreInput').addEventListener('input', function() {
            const mensajeError = document.getElementById('mensajeError');
            const inputElement = document.getElementById('nombreInput');
            mensajeError.innerHTML = '';
            inputElement.classList.remove('error-input');
        });
        
        document.getElementById('nombreInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                redirigir();
            }
        });
    </script>
</body>
</html>
